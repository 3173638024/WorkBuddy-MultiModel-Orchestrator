<svg viewBox="0 0 800 500" width="100%" xmlns="http://www.w3.org/2000/svg">
  <title>Orchestrate 架构图</title>
  <desc>Orchestrate 多模型协作编排架构：用户任务 → 配置验证 → 任务分析 → 并行执行 → 整合 → 审查 → 反馈循环 → 交付</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="500" fill="#f8f7f4" rx="12"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="500" fill="#2C2C2A">Orchestrate 多模型协作编排架构</text>

  <!-- User Input -->
  <g>
    <rect x="300" y="60" width="200" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
    <text x="400" y="82" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#2C2C2A">用户输入任务</text>
  </g>
  <line x1="400" y1="104" x2="400" y2="130" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 0: Config Validation -->
  <g class="c-purple">
    <rect x="280" y="130" width="240" height="44" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
    <text x="400" y="152" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#3C3489">Step 0: 配置验证</text>
  </g>
  <line x1="400" y1="174" x2="400" y2="200" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 1: Task Analysis -->
  <g class="c-purple">
    <rect x="280" y="200" width="240" height="44" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
    <text x="400" y="222" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#3C3489">Step 1: 任务分析（中级模型）</text>
  </g>
  <line x1="400" y1="244" x2="400" y2="270" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Parallel Execution -->
  <g>
    <rect x="280" y="270" width="240" height="80" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
    <text x="400" y="292" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#854F0B">Step 2: 并行执行子任务</text>
    <text x="400" y="312" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#854F0B">高级模型 → 复杂推理</text>
    <text x="400" y="330" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#854F0B">中级模型 → 逻辑/代码/审查</text>
  </g>
  <line x1="400" y1="350" x2="400" y2="376" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Merge -->
  <g class="c-green">
    <rect x="280" y="376" width="240" height="44" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
    <text x="400" y="398" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#3B6D11">Step 3: 结果整合（下级模型）</text>
  </g>
  <line x1="400" y1="420" x2="400" y2="446" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Review -->
  <g class="c-amber">
    <rect x="280" y="446" width="240" height="44" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
    <text x="400" y="468" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#854F0B">Step 4: 审查（中级模型）</text>
  </g>

  <!-- Feedback Loop -->
  <line x1="280" y1="468" x2="120" y2="468" stroke="#E24B4A" stroke-width="1.5"/>
  <line x1="120" y1="468" x2="120" y2="200" stroke="#E24B4A" stroke-width="1.5" marker-end="url(#arrow-red)" stroke-dasharray="5,3"/>
  <text x="110" y="340" font-family="sans-serif" font-size="12" fill="#E24B4A" transform="rotate(-90,110,340)" text-anchor="middle">打回重做</text>

  <!-- Delivery -->
  <line x1="520" y1="468" x2="680" y2="468" stroke="#639922" stroke-width="1.5"/>
  <line x1="680" y1="468" x2="680" y2="80" stroke="#639922" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="620" y="60" width="120" height="44" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text x="680" y="82" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#3B6D11">交付给用户</text>

  <!-- Legend -->
  <rect x="40" y="380" width="160" height="90" rx="8" fill="#ffffff" stroke="#888780" stroke-width="0.5"/>
  <text x="60" y="405" font-family="sans-serif" font-size="12" font-weight="500" fill="#2C2C2A">图例</text>
  <rect x="60" y="415" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="80" y="426" font-family="sans-serif" font-size="11" fill="#2C2C2A">分析/验证</text>
  <rect x="60" y="433" width="12" height="12" rx="2" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="80" y="444" font-family="sans-serif" font-size="11" fill="#2C2C2A">执行/审查</text>
  <rect x="60" y="451" width="12" height="12" rx="2" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text x="80" y="462" font-family="sans-serif" font-size="11" fill="#2C2C2A">整合/交付</text>
</svg>
