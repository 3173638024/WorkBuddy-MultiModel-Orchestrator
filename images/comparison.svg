<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif">
  <defs>
    <linearGradient id="leftTitle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F7CF7"/>
      <stop offset="100%" stop-color="#3559C7"/>
    </linearGradient>
    <linearGradient id="rightTitle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#20B26B"/>
      <stop offset="100%" stop-color="#148A52"/>
    </linearGradient>
    <linearGradient id="task1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF7A59"/>
      <stop offset="100%" stop-color="#E4583D"/>
    </linearGradient>
    <linearGradient id="task2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB347"/>
      <stop offset="100%" stop-color="#DD8C1F"/>
    </linearGradient>
    <linearGradient id="task3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#59A9FF"/>
      <stop offset="100%" stop-color="#2E79D4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="800" height="400" rx="20" fill="#F7F9FC"/>
  <rect x="16" y="16" width="768" height="368" rx="18" fill="#FFFFFF" stroke="#E6ECF5"/>

  <rect x="34" y="24" width="344" height="42" rx="10" fill="url(#leftTitle)" filter="url(#shadow)"/>
  <text x="206" y="51" text-anchor="middle" font-size="18" font-weight="700" fill="#FFF">单模型模式</text>

  <rect x="422" y="24" width="344" height="42" rx="10" fill="url(#rightTitle)" filter="url(#shadow)"/>
  <text x="594" y="51" text-anchor="middle" font-size="18" font-weight="700" fill="#FFF">Orchestrate 编排模式</text>

  <rect x="112" y="88" width="188" height="48" rx="12" fill="#6A5AE0" filter="url(#shadow)"/>
  <text x="206" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#FFF">一个模型处理全部任务</text>

  <line x1="206" y1="136" x2="206" y2="156" stroke="#B8C3D6" stroke-width="2" stroke-dasharray="5 5"/>
  <polygon points="206,164 200,154 212,154" fill="#B8C3D6"/>

  <rect x="92" y="168" width="228" height="42" rx="10" fill="url(#task1)" filter="url(#shadow)"/>
  <text x="206" y="194" text-anchor="middle" font-size="14" font-weight="700" fill="#FFF">任务 A：需求理解</text>
  <line x1="206" y1="210" x2="206" y2="230" stroke="#D7DEEA" stroke-width="2" stroke-dasharray="5 5"/>
  <polygon points="206,238 200,228 212,228" fill="#D7DEEA"/>

  <rect x="92" y="242" width="228" height="42" rx="10" fill="url(#task2)" opacity="0.82" filter="url(#shadow)"/>
  <text x="206" y="268" text-anchor="middle" font-size="14" font-weight="700" fill="#FFF">任务 B：代码生成</text>
  <line x1="206" y1="284" x2="206" y2="304" stroke="#D7DEEA" stroke-width="2" stroke-dasharray="5 5"/>
  <polygon points="206,312 200,302 212,302" fill="#D7DEEA"/>

  <rect x="92" y="316" width="228" height="42" rx="10" fill="url(#task3)" opacity="0.64" filter="url(#shadow)"/>
  <text x="206" y="342" text-anchor="middle" font-size="14" font-weight="700" fill="#FFF">任务 C：审查修正</text>

  <text x="206" y="379" text-anchor="middle" font-size="13" font-weight="700" fill="#D94C3F">串行执行：总耗时 = A + B + C</text>

  <circle cx="400" cy="205" r="28" fill="#FF5C5C" filter="url(#shadow)"/>
  <text x="400" y="211" text-anchor="middle" font-size="18" font-weight="800" fill="#FFF">VS</text>

  <rect x="530" y="82" width="128" height="40" rx="10" fill="#25364D" filter="url(#shadow)"/>
  <text x="594" y="107" text-anchor="middle" font-size="14" font-weight="700" fill="#FFD665">编排者</text>

  <line x1="594" y1="122" x2="500" y2="154" stroke="#95A4BD" stroke-width="2"/>
  <line x1="594" y1="122" x2="594" y2="154" stroke="#95A4BD" stroke-width="2"/>
  <line x1="594" y1="122" x2="688" y2="154" stroke="#95A4BD" stroke-width="2"/>

  <rect x="444" y="160" width="112" height="40" rx="10" fill="#7D5CFA" filter="url(#shadow)"/>
  <text x="500" y="184" text-anchor="middle" font-size="13" font-weight="700" fill="#FFF">高级模型</text>

  <rect x="538" y="160" width="112" height="40" rx="10" fill="#2DBE74" filter="url(#shadow)"/>
  <text x="594" y="184" text-anchor="middle" font-size="13" font-weight="700" fill="#FFF">中级模型</text>

  <rect x="632" y="160" width="112" height="40" rx="10" fill="#F39A2E" filter="url(#shadow)"/>
  <text x="688" y="184" text-anchor="middle" font-size="13" font-weight="700" fill="#FFF">基础模型</text>

  <rect x="444" y="220" width="112" height="38" rx="10" fill="url(#task1)" filter="url(#shadow)"/>
  <text x="500" y="244" text-anchor="middle" font-size="12" font-weight="700" fill="#FFF">复杂分析</text>

  <rect x="538" y="220" width="112" height="38" rx="10" fill="url(#task2)" filter="url(#shadow)"/>
  <text x="594" y="244" text-anchor="middle" font-size="12" font-weight="700" fill="#FFF">实现任务</text>

  <rect x="632" y="220" width="112" height="38" rx="10" fill="url(#task3)" filter="url(#shadow)"/>
  <text x="688" y="244" text-anchor="middle" font-size="12" font-weight="700" fill="#FFF">轻量处理</text>

  <line x1="500" y1="258" x2="560" y2="292" stroke="#7D5CFA" stroke-width="2"/>
  <line x1="594" y1="258" x2="594" y2="292" stroke="#2DBE74" stroke-width="2"/>
  <line x1="688" y1="258" x2="628" y2="292" stroke="#F39A2E" stroke-width="2"/>

  <rect x="534" y="296" width="120" height="38" rx="10" fill="#FFD665" filter="url(#shadow)"/>
  <text x="594" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#2C3340">整合审查输出</text>

  <text x="594" y="379" text-anchor="middle" font-size="13" font-weight="700" fill="#169A59">并行执行：总耗时≈最长那一路</text>
</svg>