<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#D85A30" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="th" x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#3C3489" font-weight="500">Orchestrate 六步编排工作流</text>

  <!-- Step 0 -->
  <g>
    <rect x="40" y="50" width="88" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
    <text class="th" x="84" y="72" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#633806" font-weight="500">Step 0</text>
    <text class="ts" x="84" y="92" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#854F0B">配置验证</text>
  </g>

  <!-- Arrow 0→1 -->
  <line x1="128" y1="78" x2="148" y2="78" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 1 -->
  <g>
    <rect x="152" y="50" width="88" height="56" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
    <text class="th" x="196" y="72" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3C3489" font-weight="500">Step 1</text>
    <text class="ts" x="196" y="92" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#534AB7">任务分析</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="240" y1="78" x2="260" y2="78" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <g>
    <rect x="264" y="50" width="88" height="56" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
    <text class="th" x="308" y="72" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3C3489" font-weight="500">Step 2</text>
    <text class="ts" x="308" y="92" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#534AB7">并行执行</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="352" y1="78" x2="372" y2="78" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <g>
    <rect x="376" y="50" width="88" height="56" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
    <text class="th" x="420" y="72" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3C3489" font-weight="500">Step 3</text>
    <text class="ts" x="420" y="92" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#534AB7">结果整合</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="464" y1="78" x2="484" y2="78" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4 -->
  <g>
    <rect x="488" y="50" width="88" height="56" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
    <text class="th" x="532" y="72" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3C3489" font-weight="500">Step 4</text>
    <text class="ts" x="532" y="92" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#534AB7">审查</text>
  </g>

  <!-- Arrow 4→5 -->
  <line x1="576" y1="78" x2="596" y2="78" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- Step 5 -->
  <g>
    <rect x="600" y="50" width="88" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
    <text class="th" x="644" y="72" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#712B13" font-weight="500">Step 5</text>
    <text class="ts" x="644" y="92" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#993C1D">反馈循环</text>
  </g>

  <!-- Feedback arrow: Step5 → Step 4 right side → down → left → Step 4 """
  Wait, the feedback should go from Step 5 back to Step 4.
  Step 5 is at x=600, top=50, width=88, center x=644
  Step 4 is at x=488, top=50, width=88, center x=532

  Feedback arrow: from bottom of Step 5 (x=644, y=106) → down → left → bottom of Step 4 (x=532, y=106) -->

  <!-- Feedback: Step 5 down → left → Step 4 -->
  <line x1="644" y1="106" x2="644" y2="136" stroke="#D85A30" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="644" y1="136" x2="532" y2="136" stroke="#D85A30" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="532" y1="136" x2="532" y2="106" stroke="#D85A30" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>

  <text x="588" y="130" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#993C1D">最多 3 次</text>

  <!-- Step 6 at the bottom -->
  <g>
    <rect x="344" y="200" width="112" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
    <text class="th" x="400" y="222" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0F6E56" font-weight="500">Step 6</text>
    <text class="ts" x="400" y="242" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#1D9E75">交付</text>
  </g>

  <!-- Arrow from Step 5 to Step 6: from bottom of Step 5 (x=644, y=106) → down further → then around to Step 6 center top (x=400, y=200) -->
  <path d="M644 106 L644 170 L400 170 L400 200" fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="522" y="164" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1D9E75">通过 → 交付</text>

  <!-- Three-tier label boxes -->
  <g>
    <rect x="40" y="180" width="88" height="28" rx="6" fill="#ECE9FE" stroke="#AFA9EC" stroke-width="0.5"/>
    <text x="84" y="194" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#3C3489">高级模型</text>
    <rect x="40" y="212" width="88" height="28" rx="6" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
    <text x="84" y="226" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#0C447C">中级模型</text>
    <rect x="40" y="244" width="88" height="28" rx="6" fill="#EAF3DE" stroke="#97C459" stroke-width="0.5"/>
    <text x="84" y="258" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#27500A">下级模型</text>
  </g>

  <!-- Dotted connector from model boxes to Step 2 -->
  <line x1="128" y1="194" x2="264" y2="78" stroke="#AFA9EC" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="128" y1="226" x2="264" y2="78" stroke="#85B7EB" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="128" y1="258" x2="264" y2="78" stroke="#97C459" stroke-width="0.5" stroke-dasharray="3,3"/>

  <text x="200" y="148" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888780">按评级路由到对应模型</text>
</svg>
